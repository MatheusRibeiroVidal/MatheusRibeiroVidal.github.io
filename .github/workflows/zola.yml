name: Build and Deploy Zola Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Zola
      uses: taiki-e/install-action@zola

    - name: Build site
      run: cd zola && zola build

    - name: Copy build to docs folder
      run: |
        rm -rf docs
        cp -r zola/public docs

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        git commit -m "Deploy: Update site from Zola build [skip ci]" || true
        git push
