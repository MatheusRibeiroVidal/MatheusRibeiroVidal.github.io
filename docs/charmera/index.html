        var overlay = document.getElementById('lightbox');
        var img     = document.getElementById('lightbox-img');
        var close   = document.getElementById('lightbox-close');
        var items   = document.querySelectorAll('.gallery-item');

        function open(src) {
            img.src = src;
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            overlay.classList.remove('open');
            document.body.style.overflow = '';
            img.src = '';
        }

        items.forEach(function (item) {
            item.addEventListener('click', function () {
                open(item.getAttribute('data-src'));
            });
        });

        close.addEventListener('click', closeLightbox);

        overlay.addEventListener('click', function (e) {
            if (e.target === overlay) closeLightbox();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeLightbox();
        });
    })();</script></div><footer class=site-footer role=contentinfo><p>Last updated 2026-05-25 23:15:19<p xmlns:cc=http://creativecommons.org/ns# xmlns:dct=http://purl.org/dc/terms/><span property=cc:attributionName>Matheus Ribeiro Vidal</span> — <a href="https://creativecommons.org/licenses/by-sa/4.0/?ref=chooser-v1" rel="license noopener noreferrer" target=_blank>CC BY-SA 4.0</a></footer></div>
