{% extends "base.html" %}

{% block main_content %}
<style>
  .btn-home {
    display: inline-block;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.55rem 1.4rem;
    border-radius: 6px;
    border: 2px solid var(--primary-color);
    background: var(--primary-color);
    color: var(--bg-0);
    text-decoration: none;
    transition: background 0.18s ease, color 0.18s ease;
  }
  .btn-home:hover,
  .btn-home:focus-visible {
    background: transparent;
    color: var(--primary-color);
    outline: none;
  }
</style>
<main style="text-align:center; padding: 6rem 1rem;">
    <h1 style="font-size:clamp(4rem,15vw,9rem);margin:0;line-height:1;letter-spacing:-0.04em;">
        404
    </h1>
    <p style="font-size:1.2rem;color:var(--text-1);margin:1rem 0 2rem;">
        This page doesn't exist (or has moved).
    </p>
    <a href="{{ config.base_url }}" class="btn-home">
        &larr; Back home
    </a>
</main>
{% endblock main_content %}
